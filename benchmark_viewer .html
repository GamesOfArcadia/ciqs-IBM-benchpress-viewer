<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIQS Benchmark Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --green: #00ff9d;
    --red: #ff3d6b;
    --neutral: #4a4a6a;
    --QV: #7b5ea7;
    --SU2: #00c9a7;
    --QAOA: #f7931a;
    --Heisenberg: #4a9eff;
    --Clifford: #e06cff;
    --BV: #ff9f43;
    --QFT: #54a0ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 40px 32px; }

  header { margin-bottom: 40px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header-left h1 { font-size: 2.6rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .header-left h1 span { color: var(--green); }
  .file-name { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 0.75rem; margin-top: 6px; }

  .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 48px 32px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 40px; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--green); background: #0d1a12; }
  .drop-zone input { display: none; }
  .drop-icon { font-size: 2rem; margin-bottom: 12px; }
  .drop-text { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--muted); }
  .drop-text span { color: var(--green); cursor: pointer; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
  .card-label { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; color: #8888aa; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .card-value { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 2.1rem; font-weight: 700; line-height: 1; color: var(--green); letter-spacing: -1px; }
  .card-sub { font-family: 'Syne', sans-serif; font-size: 0.73rem; color: #9999bb; margin-top: 6px; }

  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .tab { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--text); border-color: var(--neutral); }
  .tab:hover { color: var(--text); }

  .export-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; padding: 7px 16px; border-radius: 6px; border: 1px solid var(--green); background: transparent; color: var(--green); cursor: pointer; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .export-btn:hover { background: #0d1a12; }

  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .scale-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 0 8px; border-top: 1px solid var(--border); margin-top: 4px; gap: 12px; }
  .scale-header:first-child { border-top: none; padding-top: 0; }
  .scale-divider-label { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; color: #b0b0cc; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
  .sort-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .sort-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .sort-btn:hover { color: var(--text); border-color: var(--neutral); }
  .sort-btn.active { background: #1a1a28; color: var(--green); border-color: var(--green); }

  .bar-row { display: grid; grid-template-columns: 280px 1fr 90px; align-items: center; margin-bottom: 10px; gap: 12px; }
  .bar-label { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .qbadge { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; padding: 4px 8px; border-radius: 5px; background: #22223a; color: #c0c0e0; flex-shrink: 0; min-width: 64px; text-align: center; border: 1px solid #2e2e50; letter-spacing: 0.5px; }
  .bar-circuit { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { height: 22px; background: #16161f; border-radius: 4px; position: relative; overflow: hidden; min-width: 0; }
  .bar-fill { height: 100%; border-radius: 4px; position: absolute; top: 0; left: 0; transition: width 0.7s cubic-bezier(.16,1,.3,1); }
  .bar-ms { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text); text-align: right; white-space: nowrap; }

  .legend { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .empty { text-align: center; padding: 80px 0; font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 0.8rem; }

  /* ═══════════════════════════════════════
     PRINT STYLES — A4 landscape, 1 page
     4-column layout, micro typography,
     color-coded family swatches
     Handles 100+ entries comfortably
  ═══════════════════════════════════════ */
  #print-target { display: none; }

  @media print {
    @page { size: A4 landscape; margin: 6mm 8mm; }

    body { background: #fff !important; color: #000 !important; padding: 0;
           font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 6.5pt; }

    header, .drop-zone, .stats-grid, .toolbar,
    .legend, .chart-wrap { display: none !important; }

    #print-target { display: block !important; }

    .pdf-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1.5px solid #000; padding-bottom: 3px; margin-bottom: 4px;
    }
    .pdf-title { font-size: 11pt; font-weight: 800; letter-spacing: -0.3px; }
    .pdf-title em { color: #1a7a4a; font-style: normal; }
    .pdf-meta { font-size: 6pt; color: #555; text-align: right; line-height: 1.5; }

    .pdf-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
    .pdf-legend-item { display: flex; align-items: center; gap: 3px; font-size: 5.5pt; color: #333; }
    .pdf-swatch-lg { width: 8px; height: 8px; border-radius: 2px; }

    /* 4 equal columns for 100+ entries */
    .pdf-columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0 6px; align-items: start; }

    .pdf-group { margin-bottom: 3.5px; break-inside: avoid; }
    .pdf-group-header {
      font-size: 6pt; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: #666;
      border-bottom: 0.75px solid #ccc; padding-bottom: 1px; margin-bottom: 1px;
    }

    /* name + time: fixed columns, time pulled to ~55% not edge */
    .pdf-row {
      display: grid;
      grid-template-columns: 9px minmax(0, 1fr) 44px;
      align-items: center; gap: 2px;
      padding: 0.9px 0; border-bottom: 0.4px solid #f0f0f0;
    }
    .pdf-swatch { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .pdf-name { font-size: 6pt; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pdf-time { font-size: 6pt; font-family: 'Courier New', monospace; color: #111; text-align: right; font-weight: 700; padding-left: 2px; }

    /* Force color printing */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>CIQS <span>Benchmark</span><br>Viewer</h1>
    <div class="file-name" id="file-name">No file loaded</div>
  </div>
</header>

<div class="drop-zone" id="drop-zone">
  <input type="file" id="file-input" accept=".json">
  <div class="drop-icon">📂</div>
  <div class="drop-text">Drop a benchpress <span onclick="document.getElementById('file-input').click()">.json file</span> here</div>
</div>

<div id="content" style="display:none">
  <div class="stats-grid" id="stats"></div>
  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <button class="export-btn" onclick="exportPDF()">⬇ Export PDF</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="chart-wrap">
    <div id="charts"></div>
  </div>
  <div id="print-target"></div>
</div>

<script>
const FAMILY_COLORS = {
  QV: '#7b5ea7', SU2: '#00c9a7', QAOA: '#f7931a',
  Heisenberg: '#4a9eff', Clifford: '#e06cff', BV: '#ff9f43', QFT: '#54a0ff'
};

/* Always seconds */
function fmtS(ms) {
  const s = ms / 1000;
  if (s < 0.001) return s.toFixed(6) + 's';
  if (s < 0.01)  return s.toFixed(4) + 's';
  if (s < 1)     return s.toFixed(3) + 's';
  return s.toFixed(2) + 's';
}

function parseEntry(b) {
  const name   = b.name || b.fullname || '';
  const inner  = name.includes('[') ? name.split('[')[1].replace(']','') : name;
  const parts  = inner.split('_');
  const family = parts[0] || 'Unknown';
  const size   = parseInt((parts[1]||'').replace('q','')) || 0;
  const topo   = parts.slice(2).join('_') || '';
  const mean   = (b.stats?.mean || 0) * 1000;
  const stddev = (b.stats?.stddev || 0) * 1000;
  const rounds = b.stats?.rounds || 0;
  return { name, inner, family, size, topo, mean, stddev, rounds };
}

const sortState = {};
function getSortState(pid, sz)      { return (sortState[pid]||{})[sz] || 'default'; }
function setSortState(pid, sz, val) { if (!sortState[pid]) sortState[pid]={}; sortState[pid][sz]=val; }

let _allEntries = [];
let _maxMs = 0;

function renderGroup(panelId, size, rows, maxMs) {
  const el = document.getElementById(`group-${panelId}-${size}`);
  if (!el) return;
  const state = getSortState(panelId, size);
  el.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === state));
  let sorted = [...rows];
  if (state === 'asc')  sorted.sort((a,b) => a.mean - b.mean);
  if (state === 'desc') sorted.sort((a,b) => b.mean - a.mean);
  el.querySelector('.group-bars').innerHTML = sorted.map(d => {
    const w = (d.mean / maxMs * 100).toFixed(1);
    const color = FAMILY_COLORS[d.family] || '#888';
    const label = d.family + (d.topo ? ' · ' + d.topo.replace(/_/g,' ') : '');
    return `<div class="bar-row">
      <div class="bar-label">
        <span class="qbadge">${d.size.toLocaleString()}q</span>
        <span class="bar-circuit" title="${d.inner}">${label}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div>
      <div class="bar-ms">${fmtS(d.mean)}</div>
    </div>`;
  }).join('');
}

function buildPanel(id, rows) {
  const chartsEl = document.getElementById('charts');
  const div = document.createElement('div');
  div.className = 'panel' + (id === 'all' ? ' active' : '');
  div.id = 'panel-' + id;
  if (!rows.length) { div.innerHTML = '<div class="empty">No data</div>'; chartsEl.appendChild(div); return; }
  const sizes  = [...new Set(rows.map(e => e.size))].sort((a,b) => b-a);
  const bySize = {};
  sizes.forEach(s => { bySize[s] = rows.filter(e=>e.size===s).sort((a,b)=>a.family.localeCompare(b.family)||a.topo.localeCompare(b.topo)); });
  div.innerHTML = sizes.map(size => `
    <div id="group-${id}-${size}">
      <div class="scale-header">
        <span class="scale-divider-label">${size.toLocaleString()} qubits</span>
        <div class="sort-controls">
          <button class="sort-btn active" data-sort="default" onclick="handleSort('${id}',${size},'default')">Default</button>
          <button class="sort-btn" data-sort="asc"     onclick="handleSort('${id}',${size},'asc')">↑ Fastest</button>
          <button class="sort-btn" data-sort="desc"    onclick="handleSort('${id}',${size},'desc')">↓ Slowest</button>
        </div>
      </div>
      <div class="group-bars"></div>
    </div>`).join('');
  chartsEl.appendChild(div);
  sizes.forEach(size => renderGroup(id, size, bySize[size], _maxMs));
}

function handleSort(panelId, size, dir) {
  const rows = (panelId==='all'?_allEntries:_allEntries.filter(e=>e.family===panelId))
               .filter(e=>e.size===size)
               .sort((a,b)=>a.family.localeCompare(b.family)||a.topo.localeCompare(b.topo));
  setSortState(panelId, size, dir);
  renderGroup(panelId, size, rows, _maxMs);
}

/* ── PDF export ── */
function exportPDF() {
  if (!_allEntries.length) return;
  const entries  = _allEntries;
  const families = [...new Set(entries.map(e=>e.family))].sort();
  const sizes    = [...new Set(entries.map(e=>e.size))].sort((a,b)=>b-a);
  const bySize   = {};
  sizes.forEach(s => {
    bySize[s] = [...entries.filter(e=>e.size===s)]
      .sort((a,b)=>a.family.localeCompare(b.family)||a.topo.localeCompare(b.topo));
  });

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  const legendHTML = families.map(f=>`
    <div class="pdf-legend-item">
      <div class="pdf-swatch-lg" style="background:${FAMILY_COLORS[f]||'#888'}"></div>
      <span>${f}</span>
    </div>`).join('');

  /* Build flat group blocks */
  const groupBlocks = sizes.map(size => {
    const rowsHTML = bySize[size].map(d => {
      const label = d.family + (d.topo ? ' · ' + d.topo.replace(/_/g,' ') : '');
      return `<div class="pdf-row">
        <div class="pdf-swatch" style="background:${FAMILY_COLORS[d.family]||'#888'}"></div>
        <div class="pdf-name">${label}</div>
        <div class="pdf-time">${fmtS(d.mean)}</div>
      </div>`;
    }).join('');
    return { size, count: bySize[size].length, html: `
      <div class="pdf-group">
        <div class="pdf-group-header">${size.toLocaleString()} qubits</div>
        ${rowsHTML}
      </div>` };
  });

  /* Distribute into 4 columns by total row count (greedy balanced) */
  const cols = [[], [], [], []];
  const colH = [0, 0, 0, 0];
  groupBlocks.forEach(g => {
    const minCol = colH.indexOf(Math.min(...colH));
    cols[minCol].push(g.html);
    colH[minCol] += g.count + 1.5; // header weight
  });

  document.getElementById('print-target').innerHTML = `
    <div class="pdf-header">
      <div class="pdf-title"><em>CIQS</em> Benchpress</div>
      <div class="pdf-meta">
        ${entries.length} benchmarks &nbsp;·&nbsp; ${families.length} families &nbsp;·&nbsp; ${sizes.length} qubit scales<br>
        ${dateStr}
      </div>
    </div>
    <div class="pdf-legend">${legendHTML}</div>
    <div class="pdf-columns">
      <div>${cols[0].join('')}</div>
      <div>${cols[1].join('')}</div>
      <div>${cols[2].join('')}</div>
      <div>${cols[3].join('')}</div>
    </div>`;

  window.print();
}

/* ── load ── */
function load(data) {
  const benchmarks = data.benchmarks || [];
  if (!benchmarks.length) return;
  const entries  = benchmarks.map(parseEntry);
  _allEntries    = entries;
  _maxMs         = Math.max(...entries.map(e=>e.mean));
  const families = [...new Set(entries.map(e=>e.family))].sort();
  const sizes    = [...new Set(entries.map(e=>e.size))].sort((a,b)=>b-a);
  const fastest  = entries.reduce((a,b)=>a.mean<b.mean?a:b);
  const slowest  = entries.reduce((a,b)=>a.mean>b.mean?a:b);
  const maxSize  = Math.max(...entries.map(e=>e.size));

  document.getElementById('stats').innerHTML = `
    <div class="card">
      <div class="card-label">Total Benchmarks</div>
      <div class="card-value">${entries.length}</div>
      <div class="card-sub">${families.length} circuit families</div>
    </div>
    <div class="card">
      <div class="card-label">Max Scale</div>
      <div class="card-value">${maxSize.toLocaleString()}q</div>
      <div class="card-sub">${sizes.length} qubit sizes</div>
    </div>
    <div class="card">
      <div class="card-label">Fastest</div>
      <div class="card-value" style="font-size:1.5rem">${fmtS(fastest.mean)}</div>
      <div class="card-sub">${fastest.inner}</div>
    </div>
    <div class="card">
      <div class="card-label">Slowest</div>
      <div class="card-value" style="font-size:1.5rem;color:var(--muted)">${fmtS(slowest.mean)}</div>
      <div class="card-sub">${slowest.inner}</div>
    </div>`;

  document.getElementById('legend').innerHTML = families.map(f=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${FAMILY_COLORS[f]||'#888'}"></div>${f}
    </div>`).join('');

  document.getElementById('tabs').innerHTML =
    `<button class="tab active" onclick="switchTab('all',this)">All</button>` +
    families.map(f=>`<button class="tab" onclick="switchTab('${f}',this)">${f}</button>`).join('');

  document.getElementById('charts').innerHTML = '';
  buildPanel('all', entries);
  families.forEach(f => buildPanel(f, entries.filter(e=>e.family===f)));
  document.getElementById('content').style.display = 'block';
}

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

function readFile(file) {
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try { const data = JSON.parse(e.target.result); load(data); document.getElementById('drop-zone').style.display='none'; }
    catch { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e=>readFile(e.target.files[0]));
const dz = document.getElementById('drop-zone');
dz.addEventListener('click', ()=>document.getElementById('file-input').click());
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('drag-over');readFile(e.dataTransfer.files[0]);});
</script>
</body>
</html>
