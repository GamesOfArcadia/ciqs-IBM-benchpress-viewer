<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMES OF ARCADIA - PDF Viewer</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* PDF viewer fills space above footer */
        #pdfViewer {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* Footer base */
        footer {
            height: 2cm;
            min-height: 50px;
            background: #f5f5f5;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 1em;
            box-sizing: border-box;
            border-top: 1px solid #ccc;
        }

        /* Left section */
        .footer-left {
            position: absolute;
            left: 1em;
            display: flex;
            align-items: center;
            gap: 0.5em;
        }

        /* Logo */
        .logo {
            width: 1cm;
            height: 1cm;
            min-width: 40px;
            min-height: 40px;
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-decoration: none;
            font-size: 1em;
        }

        .footer-left span {
            font-size: 0.9em;
            font-weight: bold;
        }

        /* Center navigation - perfectly centered */
        .footer-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
        }

            /* Buttons */
            .footer-center button {
                margin: 0 0.5em;
                width: 110px;
                padding: 0.4em 0;
                font-size: 0.9em;
                cursor: pointer;
                text-align: center;
                border: 1px solid #333;
                background: white;
                transition: 0.2s;
            }

                .footer-center button:hover {
                    background: #ddd;
                }

        /* Right section */
        .footer-right {
            position: absolute;
            right: 1em;
            font-size: 0.8em;
        }
    </style>
</head>

<body>

    <!-- PDF Viewer -->
    <iframe id="pdfViewer"></iframe>

    <!-- Footer -->
    <footer>
        <div class="footer-left">
            <a href="https://www.instagram.com/gamesofarcadia/" target="_blank" class="logo">GoA</a>
            <span>GAMES OF ARCADIA | A Causal Iteration Framework | DOI: XXXXXXXXXXXX</span>
        </div>

        <div class="footer-center">
            <button onclick="prevPDF()">Previous</button>
            <button onclick="nextPDF()">Next</button>
        </div>

        <div class="footer-right">
            © 2026 GAMES OF ARCADIA - ALL RIGHTS RESERVED
        </div>
    </footer>

    <script>
        const pdfs = [
            { file: "1 - A Causal Iteration Framework.pdf" },
            //{ file: "2 - A Timeless Reformulation of General Relativity.pdf" }
        ];

        let currentIndex = 0;
        const viewer = document.getElementById('pdfViewer');

        /* Load initial PDF safely */
        if (pdfs.length > 0) {
            viewer.src = "pdfs/" + pdfs[0].file;
        }

        function nextPDF() {
            if (currentIndex < pdfs.length - 1) {
                currentIndex++;
                viewer.src = "pdfs/" + pdfs[currentIndex].file;
            }
        }

        function prevPDF() {
            if (currentIndex > 0) {
                currentIndex--;
                viewer.src = "pdfs/" + pdfs[currentIndex].file;
            }
        }
    </script>

</body>
</html>
